config system global
    set hostname "FortiGate-Fictif-3VDOM"
    set version "v7.2.4"
    set model "FG-200F"
    set serial "FG200FTK23000999"
end

config vdom
    edit "root"
    next
    edit "vdom_lan"
    next
    edit "vdom_dmz"
    next
end

# Configurations inside Root VDOM
config vdom
    edit "root"
        config system interface
            edit "port1"
                set vdom "root"
                set ip 203.0.113.50 255.255.255.240
                set type physical
                set role wan
                set status up
            next
        end
        config router static
            edit 1
                set dst 0.0.0.0 0.0.0.0
                set gateway 203.0.113.33
                set device "port1"
            next
        end
    next

    edit "vdom_lan"
        config system interface
            edit "port2"
                set vdom "vdom_lan"
                set ip 10.1.1.254 255.255.255.0
                set type physical
                set role lan
                set status up
            next
            edit "vlink_lan0"
                set vdom "vdom_lan"
                set type vdom-link
                set status up
            next
        end
        config system zone
            edit "Zone-Internal"
                set interface "port2"
            next
        end
        config firewall address
            edit "LAN-Subnet-10"
                set type subnet
                set subnet 10.1.1.0 255.255.255.0
            next
            edit "Any"
                set type subnet
                set subnet 0.0.0.0 0.0.0.0
            next
        end
        config firewall policy
            edit 10
                set name "LAN-Access"
                set srcintf "Zone-Internal"
                set dstintf "vlink_lan0"
                set srcaddr "LAN-Subnet-10"
                set dstaddr "Any"
                set action accept
                set service "ALL"
                set status enable
            next
        end
    next

    edit "vdom_dmz"
        config system interface
            edit "port3"
                set vdom "vdom_dmz"
                set ip 172.16.50.254 255.255.255.0
                set type physical
                set role dmz
                set status up
            next
            edit "vlink_dmz0"
                set vdom "vdom_dmz"
                set type vdom-link
                set status up
            next
        end
        config system zone
            edit "Zone-DMZ"
                set interface "port3"
            next
        end
        config firewall address
            edit "DMZ-Subnet-172"
                set type subnet
                set subnet 172.16.50.0 255.255.255.0
            next
        end
        config firewall vip
            edit "VIP-WebServer"
                set extip 203.0.113.55
                set mappedip 172.16.50.10
                set extintf "vlink_dmz0"
                set portforward enable
                set extport 443
                set mappedport 443
            next
        end
        config firewall policy
            edit 20
                set name "DMZ-Publish"
                set srcintf "vlink_dmz0"
                set dstintf "Zone-DMZ"
                set srcaddr "Any"
                set dstaddr "VIP-WebServer"
                set action accept
                set service "HTTPS"
                set status enable
            next
        end
    next
end
